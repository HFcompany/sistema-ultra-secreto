<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ultra Secreto 2.0</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
}

.container {
    max-width: 400px;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
}

input {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 80%;
}
</style>
</head>

<body>

<div class="container">
    <h2 id="texto">🤖 Clique para iniciar o sistema</h2>
    <div id="areaInput"></div>
    <button onclick="iniciar()" id="botao">Iniciar</button>
</div>

<script>

let nome = "";
let etapa = 0;

let titulos = [
    "Patrimônio da Beleza de Caru 🌎 Bug no Sistema de Tão Incrível 💻"
];

function iniciar() {
    const texto = document.getElementById("texto");
    const areaInput = document.getElementById("areaInput");
    const botao = document.getElementById("botao");

    if (etapa === 0) {
        texto.innerText = "Usuária detectada. Informe seu nome:";
        areaInput.innerHTML = "<input id='nomeInput'>";
        botao.innerText = "Continuar";
        etapa++;
    }

    else if (etapa === 1) {
        nome = document.getElementById("nomeInput").value;
        texto.innerText = "Analisando dados biométricos...";
        areaInput.innerHTML = "";
        botao.style.display = "none";

        setTimeout(() => {
            texto.innerText = "⚠ ERRO CRÍTICO ⚠";
        }, 1500);

        setTimeout(() => {
            texto.innerText = "Nível de charme excede os limites do sistema.";
        }, 3000);

        setTimeout(() => {
            texto.innerText = nome + ", você foi oficialmente classificada como:";
        }, 4500);

        setTimeout(() => {
            texto.innerText = titulos[Math.floor(Math.random() * titulos.length)];
        }, 6000);

        setTimeout(() => {
            texto.innerText = "Antes de encerrar, como você está se sentindo hoje?";
            areaInput.innerHTML = "<input id='humorInput'>";
            botao.style.display = "inline-block";
        }, 8000);

        etapa++;
    }

    else if (etapa === 2) {
        let humor = document.getElementById("humorInput").value.toLowerCase();
        areaInput.innerHTML = "";
        botao.style.display = "none";

        if (humor === "triste") {
            texto.innerText = "Sistema detectou tentativa de tristeza...";
        } else if (humor === "feliz") {
            texto.innerText = "Sua felicidade está iluminando 3 continentes.";
        } else {
            texto.innerText = "Estado emocional registrado.";
        }

        setTimeout(() => {
            texto.innerText = nome + ", Carutapera claramente tem sorte em te ter por aí!";
        }, 3000);

        setTimeout(() => {
            texto.innerText = "🤖 Programa encerrado antes que essa usuária me quebre.";
        }, 6000);

        etapa++;
    }
}

</script>

</body>
</html>
